<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Insurance Premium Prediction</title>
<!--    <link rel="stylesheet" href="../static/css/index.css">-->
    <link href="{{url_for('static', filename='css/index.css') }}" rel="stylesheet"/>
</head>
<body>
    <div id="main">
        <div class="div_0">
            <h2>Insurance Premium Prediction</h2>
        </div>
        <div class="div_1">
            <a href="/train_evaluation"><button>Train & Evaluate</button></a><br>
            <span>Result: {{train_result}}</span>
        </div>
        <div class="div_2">
            <div class="div_2_2">
                <h4>Start Prediction</h4>
            </div>
            <form name="form" action="/prediction" method="POST">
                <div class="myfrm">
                    <span>Age</span><br>
                    <input type="number" placeholder="Enter your age" name="age">
                </div>
                <div class="myfrm">
                    <span>BMI</span><br>
                    <input type="number" placeholder="Enter your body mask index" name="bmi">
                </div>
                <div class="myfrm">
                    <span>Children</span><br>
                    <select name="children">
                        <option>0</option>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                        <option>5</option>
                    </select>
                </div>
                <div class="myfrm">
                    <span>Gender</span><br>
                    <select name="sex">
                        <option>Male</option>
                        <option>Female</option>
                    </select>
                </div>
                <div class="myfrm">
                    <span>Smoker</span><br>
                    <select name="smoker">
                        <option>Yes</option>
                        <option>No</option>
                    </select>
                </div>
                <div class="myfrm">
                    <span>Region</span><br>
                    <select name="region">
                        <option>Southeast</option>
                        <option>Northeast</option>
                        <option>Northwest</option>
                        <option>Southwest</option>
                    </select>
                </div>
                <div class="myfrm">
                    <button type="submit">Submit</button>
                 </div>
            </form>
        </div>
        <div class="div_3">
            <span class="sp1">Expenses: {{predicted_value}}</span>
        </div>
    </div>


</body>
</html>
